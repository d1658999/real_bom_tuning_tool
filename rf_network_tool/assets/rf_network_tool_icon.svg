<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">RF Network Cascade Tool Icon</title>
  <desc id="desc">Instrument-style app icon with cascaded RF network nodes and an S-parameter trace.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182434"/>
      <stop offset="0.58" stop-color="#102033"/>
      <stop offset="1" stop-color="#07111c"/>
    </linearGradient>
    <linearGradient id="panel" x1="60" y1="54" x2="196" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25425f"/>
      <stop offset="1" stop-color="#132436"/>
    </linearGradient>
    <linearGradient id="trace" x1="54" y1="132" x2="204" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21d4fd"/>
      <stop offset="0.5" stop-color="#32f6c8"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="18" y="18" width="220" height="220" rx="46" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="41" y="42" width="174" height="172" rx="26" fill="url(#panel)" stroke="#45677f" stroke-width="2"/>

  <g opacity="0.25" stroke="#8fb3c8" stroke-width="1">
    <path d="M62 80H194"/>
    <path d="M62 116H194"/>
    <path d="M62 152H194"/>
    <path d="M62 188H194"/>
    <path d="M80 62V195"/>
    <path d="M116 62V195"/>
    <path d="M152 62V195"/>
    <path d="M188 62V195"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M62 132C80 92 101 91 119 132S157 173 176 132s30-39 47 0"
          stroke="url(#trace)" stroke-width="11"/>
    <path d="M62 132H86M108 132H147M169 132H194"
          stroke="#aaf7ff" stroke-width="5" opacity="0.88"/>
  </g>

  <g>
    <circle cx="62" cy="132" r="18" fill="#111d2a" stroke="#21d4fd" stroke-width="7"/>
    <circle cx="119" cy="132" r="18" fill="#111d2a" stroke="#32f6c8" stroke-width="7"/>
    <circle cx="176" cy="132" r="18" fill="#111d2a" stroke="#ffd166" stroke-width="7"/>
    <circle cx="62" cy="132" r="6" fill="#d6fbff"/>
    <circle cx="119" cy="132" r="6" fill="#dcfff4"/>
    <circle cx="176" cy="132" r="6" fill="#fff4c7"/>
  </g>

  <path d="M82 190H174" stroke="#5f7f91" stroke-width="8" stroke-linecap="round"/>
  <path d="M104 190H152" stroke="#d8edf5" stroke-width="4" stroke-linecap="round" opacity="0.84"/>
</svg>
